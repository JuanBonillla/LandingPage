<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberHUB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Fondo Animado de Partículas -->
    <canvas id="particles-canvas"></canvas>

    <!-- Contenedor Principal (Efecto Cristal) -->
    <div class="main-wrapper">
        
        <header class="header glass-panel">
            <div class="logo">Barber<span class="gold-text">HUB</span></div>
            <nav class="nav" id="nav-menu">
                <a href="#inicio" class="nav-link">Inicio</a>
                <a href="#servicios" class="nav-link">Servicios</a>
                <a href="#reservas" class="nav-link btn-nav">Agendar</a>
            </nav>
            <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
        </header>

        <section id="inicio" class="hero">
            <div class="hero-content glass-panel tilt-card">
                <h1 class="glitch" data-text="BarberHUB">BarberHUB</h1>
                <!-- Efecto de máquina de escribir -->
                <h2 class="typewriter-text">El arte de la barbería con el sello <span class="gold-text dynamic-text"></span><span class="cursor">|</span></h2>
                <p>Sistema interactivo de reservas y gestión de estilo.</p>
                <a href="#reservas" class="btn-primary glow-btn">Reservar Cita</a>
            </div>
        </section>

        <section id="servicios" class="services">
            <h2 class="section-title">Servicios mas solicitados</h2>
            <div class="services-grid" id="services-container">
                <!-- Se inyectan con JS -->
            </div>
        </section>

        <section id="reservas" class="booking">
            <div class="booking-container glass-panel">
                <h2>Agenda tu Espacio</h2>
                <form id="booking-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Cliente</label>
                        <input type="text" id="cliente" required placeholder="Tu nombre">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-cut"></i> Servicio</label>
                            <select id="servicio-select" required>
                                <option value="" disabled selected>Seleccionar...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> Fecha</label>
                            <input type="date" id="fecha" required>
                        </div>
                    </div>
                    <div class="total-box">
                        <span>Total:</span>
                        <strong id="total-price" class="gold-text">$0</strong>
                    </div>
                    <button type="submit" class="btn-primary btn-block glow-btn">Confirmar Reserva</button>
                </form>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
